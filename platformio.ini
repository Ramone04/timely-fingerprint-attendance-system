[platformio]
extra_configs = secrets.ini

[common]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed  = 115200

build_type = release
board_build.partitions = min_spiffs.csv
build_flags =
    -Iinclude
    -Os

lib_deps =
    adafruit/Adafruit Fingerprint Sensor Library @ ^2.1.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    knolleary/PubSubClient @ ^2.8.0

; ─────────────────────────────────────────────────────────────
; ENVIRONMENTS DE PRODUÇÃO — upload por OTA
; ─────────────────────────────────────────────────────────────

[env:enroll]
extends = common
upload_protocol = espota
upload_port = 192.168.68.220
upload_flags =
    --port=3232
    --auth=${secrets.ota_password}
build_src_filter =
    +<modules/>
    +<enroll/>
build_flags =
    ${common.build_flags}
    -D OTA_HOSTNAME=\"ESP32-Timely-Enroll\"
    -D OTA_PASSWORD=\"${secrets.ota_password}\"
    -D MQTT_CLIENT=\"${secrets.mqtt_client_enroll}\"

[env:scan]
extends = common
upload_protocol = espota
upload_port = 192.168.68.220
upload_flags =
    --port=3232
    --auth=${secrets.ota_password}
build_src_filter =
    +<modules/>
    +<scan/>
build_flags =
    ${common.build_flags}
    -D OTA_HOSTNAME=\"ESP32-Timely-Scan\"
    -D OTA_PASSWORD=\"${secrets.ota_password}\"
    -D MQTT_CLIENT=\"${secrets.mqtt_client_scan}\"

[env:test]
extends = common
upload_protocol = espota
upload_port = 192.168.68.220
upload_flags =
    --port=3232
    --auth=${secrets.ota_password}
build_src_filter =
    +<modules/>
    +<test/>
build_flags =
    ${common.build_flags}
    -D OTA_HOSTNAME=\"ESP32-Timely-Test\"
    -D OTA_PASSWORD=\"${secrets.ota_password}\"

; ─────────────────────────────────────────────────────────────
; ENVIRONMENTS DE FLASH POR CABO — usar quando precisas USB
; ─────────────────────────────────────────────────────────────

[env:enroll-cable]
extends = common
upload_port = COM3              
build_src_filter =
    +<modules/>
    +<enroll/>
build_flags =
    ${common.build_flags}
    -D OTA_HOSTNAME=\"ESP32-Timely-Enroll\"
    -D OTA_PASSWORD=\"${secrets.ota_password}\"
    -D MQTT_CLIENT=\"${secrets.mqtt_client_enroll}\"

[env:scan-cable]
extends = common
upload_port = COM3
build_src_filter =
    +<modules/>
    +<scan/>
build_flags =
    ${common.build_flags}
    -D OTA_HOSTNAME=\"ESP32-Timely-Scan\"
    -D OTA_PASSWORD=\"${secrets.ota_password}\"
    -D MQTT_CLIENT=\"${secrets.mqtt_client_scan}\"

[env:test-cable]
extends = common
upload_port = COM3
build_src_filter =
    +<modules/>
    +<test/>
build_flags =
    ${common.build_flags}
    -D OTA_HOSTNAME=\"ESP32-Timely-Test\"
    -D OTA_PASSWORD=\"${secrets.ota_password}\"
    